server:
  port: 9527

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cpt208_discussion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 60000ms
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-this-jwt-secret-before-deploying}
    access-token-days: ${JWT_ACCESS_TOKEN_DAYS:7}
  ai:
    api-key: ${DEEPSEEK_API_KEY:}
    api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/chat/completions}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
