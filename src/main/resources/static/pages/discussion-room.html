<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMind - Discussion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="../assets/css/tokens.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
<div class="page-header page-header-student">
    <div class="container">
        <div class="row" style="justify-content:space-between;align-items:center;">
            <div>
                <h1>Discussion Room</h1>
                <div class="page-header-sub">Group: <span id="groupName"></span> &middot; Session ID: <span id="sessionIdText"></span> &middot; Status: <span id="sessionStatusText">Waiting</span></div>
            </div>
            <div class="row">
                <button class="btn btn-glass" type="button" onclick="window.location.href='./waiting-room.html'">&#x2B05;&#xFE0F; Back</button>
            </div>
        </div>
    </div>
</div>
<div id="notificationOverlay" class="notification-overlay" style="display:none;">
    <div class="notification-box" id="notificationBox">
        <div id="notificationText"></div>
    </div>
</div>
<div class="page-body">
    <div class="container stack">
        <div id="timerBar" class="card" style="display:none;">
            <div class="row" style="justify-content:space-between;font-size:14px;margin-bottom:4px;">
                <span>Topic: <strong id="sessionTopic"></strong></span>
                <span id="timerText" style="font-weight:600;color:var(--blue-600);">--:--</span>
            </div>
            <div class="progress" style="height:8px;">
                <div id="timerProgress" class="progress-bar" style="width:0%;transition:width 1s linear;"></div>
            </div>
        </div>
        <div class="row" style="align-items:flex-start;">
            <div class="card stack" style="flex:2;">
                <h2>Member Participation</h2>
                <div id="memberList" class="stack"></div>
                <button id="speakButton" class="btn speak-btn" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    &#x1F3A4; Hold to Speak
                </button>
                <div id="message"></div>
            </div>
            <div class="card stack" style="flex:1;">
                <h2>Leaderboard</h2>
                <div id="rankingList" class="stack"></div>
                <button id="aiGuideButton" class="btn btn-outline ai-guide-btn" type="button">
                    <img src="../assets/images/ai-robot.svg" alt="AI" width="22" height="22">
                    Ask AI Guide &#x1F4AC;
                </button>
            </div>
        </div>
        <div class="card stack">
            <div class="row" style="justify-content:space-between;align-items:center;">
                <h2>Speaking Log</h2>
                <div class="row" style="gap:8px;align-items:center;">
                    <span id="speakingLogMeta" class="form-hint"></span>
                    <button id="refreshLogButton" class="btn btn-outline" type="button" style="font-size:12px;padding:4px 10px;">&#x1F504; Refresh</button>
                </div>
            </div>
            <div id="speakingTimeline" class="stack" style="max-height:220px;overflow-y:auto;">
                <div class="form-hint">No speaking events yet.</div>
            </div>
        </div>
    </div>
</div>
<!-- Voice Input Overlay -->
<div id="voiceOverlay" class="voice-overlay" style="display:none;">
    <div class="voice-overlay-content">
        <div class="voice-wave">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>
        <div id="voiceTimer" class="voice-timer">0:00</div>
        <div class="voice-hint">Release to stop</div>
    </div>
</div>
<div id="aiGuideBubble" class="ai-guide-bubble" style="display:none;">
    <div class="ai-guide-bubble-header">
        <img src="../assets/images/ai-robot.svg" alt="AI" class="ai-robot-avatar" width="40" height="40">
        <div class="ai-guide-bubble-label">AI Guide</div>
    </div>
    <div id="aiGuideContent" class="ai-guide-bubble-content"></div>
</div>
<script src="../assets/js/common/storage.js"></script>
<script src="../assets/js/common/api.js"></script>
<script src="../assets/js/common/auth.js"></script>
<script src="../assets/js/common/utils.js"></script>
<script src="../assets/js/common/websocket.js"></script>
<script src="../assets/js/pages/discussion-room.js"></script>
</body>
</html>
