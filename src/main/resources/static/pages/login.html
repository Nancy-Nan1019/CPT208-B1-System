<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMind - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="../assets/css/tokens.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
<div class="page-shell centered">
    <div class="container" style="max-width: 520px;">
        <div class="login-brand">
            <div class="login-logo">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 3C11.4 3 6 8.1 6 14.3c0 3.8 1.9 7.2 5 9.3V27a2 2 0 002 2h10a2 2 0 002-2v-3.4c3.1-2.1 5-5.5 5-9.3C30 8.1 24.6 3 18 3z" fill="rgba(255,255,255,.9)"/>
                    <path d="M14 30h8v1.5a2.5 2.5 0 01-2.5 2.5h-3a2.5 2.5 0 01-2.5-2.5V30z" fill="rgba(255,255,255,.7)"/>
                    <path d="M18 8v8M14 12h8" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
                    <defs><linearGradient id="glow" x1="14" y1="8" x2="22" y2="16"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs>
                </svg>
            </div>
            <div class="login-title">OpenMind</div>
            <div class="login-subtitle">Open Your Mind, Start the Discussion</div>
        </div>
        <div class="card stack">
            <h1 id="pageTitle">Login</h1>
            <form id="loginForm" class="stack">
                <div id="nameRow" class="form-group" style="display:none;">
                    <label class="form-label" for="name">Name</label>
                    <input id="name" class="input" placeholder="Your display name" minlength="2">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" class="input" type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="input" type="password" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div id="roleRow" class="form-group" style="display:none;">
                    <label class="form-label" for="role">Role</label>
                    <select id="role" class="input">
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                <button id="submitButton" class="btn" type="submit">&#x1F680; Login</button>
            </form>
            <button id="modeToggle" class="btn btn-outline" type="button">&#x270F;&#xFE0F; No account? Register</button>
            <div id="message"></div>
        </div>
    </div>
</div>
<script src="../assets/js/common/storage.js"></script>
<script src="../assets/js/common/api.js"></script>
<script src="../assets/js/common/auth.js"></script>
<script src="../assets/js/common/utils.js"></script>
<script src="../assets/js/pages/login.js"></script>
</body>
</html>
